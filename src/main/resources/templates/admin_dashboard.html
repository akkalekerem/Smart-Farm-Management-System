<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table class="w-full">
    <thead>
    <tr>
        <th>Ad Soyad</th>
        <th>Email</th>
        <th>İşlemler</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.firstName + ' ' + user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td>
            <a th:href="@{/admin/user/delete/{id}(id=${user.id})}" class="text-red-500">Sil</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>

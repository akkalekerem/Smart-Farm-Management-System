<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli - Cihaz Yönetimi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

<!-- SOL MENÜ (Fragment Kullanımı) -->
<div th:replace="~{fragments/admin_sidebar :: adminSidebar('devices')}"></div>

<!-- SAĞ KISIM (CİHAZ TABLOSU) -->
<main class="flex-1 overflow-y-auto p-8">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Cihaz Filo Yönetimi</h1>
            <span class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-medium" th:text="${devices.size() + ' Cihaz Kayıtlı'}"></span>
        </div>

        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-gray-100 text-gray-700 text-sm uppercase tracking-wider">
                <th class="p-3 border-b font-bold text-xs">Sahip</th>
                <th class="p-3 border-b font-bold text-xs">Cihaz Adı / MAC</th>
                <th class="p-3 border-b font-bold text-xs text-center">Bağlantı</th>
                <th class="p-3 border-b font-bold text-xs text-center">Pil & Sinyal</th>
                <th class="p-3 border-b font-bold text-xs">Son İletişim</th>
                <th class="p-3 border-b font-bold text-xs text-center">İşlemler</th>
            </tr>
            </thead>
            <tbody>
            <!-- Cihaz Listesi Döngüsü -->
            <tr th:each="device : ${devices}" class="hover:bg-gray-50 border-b transition duration-150">
                <!-- 1. Sahip (Kullanıcı Yoksa Hata Vermemesi İçin Null Kontrolü) -->
                <td class="p-3 text-gray-800 font-medium" th:text="${device.owner != null ? device.owner.firstName + ' ' + device.owner.lastName : 'Sahipsiz'}"></td>

                <!-- 2. Cihaz Adı ve MAC Adresi -->
                <td class="p-3">
                    <div class="text-gray-800 font-semibold" th:text="${device.deviceName}">Ana Ünite</div>
                    <div class="text-xs text-gray-500 font-mono mt-1" th:text="${device.macAddress}">00:00:00:00</div>
                </td>

                <!-- 3. Bağlantı Durumu (Online/Offline) -->
                <td class="p-3 text-center">
                    <span th:if="${device.isOnline}" class="px-3 py-1 text-xs font-bold rounded-full bg-green-100 text-green-800 border border-green-200">
                        🟢 ONLINE
                    </span>
                    <span th:if="${!device.isOnline}" class="px-3 py-1 text-xs font-bold rounded-full bg-red-100 text-red-800 border border-red-200">
                        🔴 OFFLINE
                    </span>
                </td>

                <!-- 4. Pil ve Wi-Fi Sinyali -->
                <td class="p-3 text-center">
                    <div class="flex flex-col items-center justify-center space-y-1">
                        <!-- Şarj oluyorsa ⚡ emojisi çıkar -->
                        <span class="text-sm font-bold" th:classappend="${device.batteryLevel < 20 ? 'text-red-500' : 'text-gray-700'}">
                            🔋 %<span th:text="${device.batteryLevel}"></span>
                            <span th:if="${device.isCharging}" class="text-yellow-500" title="Güneş Paneli Aktif">⚡</span>
                        </span>
                        <span class="text-xs text-gray-500 font-mono" th:text="'📶 ' + ${device.wifiSignal} + ' dBm'"></span>
                    </div>
                </td>

                <!-- 5. Son Güncelleme -->
                <td class="p-3 text-sm text-gray-600" th:text="${#temporals.format(device.lastUpdate, 'dd-MM-yyyy HH:mm')}">
                    01-01-2026 12:00
                </td>

                <!-- 6. İşlemler -->
                <td class="p-3 text-center space-x-2">
                    <a href="#" class="text-blue-500 hover:text-blue-700 font-bold text-sm inline-flex items-center">
                        🔍 Telemetri
                    </a>
                </td>
            </tr>

            <!-- Liste Boşsa -->
            <tr th:if="${#lists.isEmpty(devices)}">
                <td colspan="6" class="p-10 text-center text-gray-500 italic bg-gray-50">
                    Sistemde henüz eşleştirilmiş hiçbir cihaz bulunmuyor.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>

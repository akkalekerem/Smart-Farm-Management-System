<!-- fragments/admin_sidebar.html -->
<aside th:fragment="adminSidebar(activeMenu)" class="w-64 bg-gray-800 text-white flex flex-col justify-between shadow-xl">
    <div>
        <div class="bg-gray-900 p-6 text-center border-b border-gray-700">
            <h2 class="text-2xl font-bold text-green-400">Smart Farm</h2>
            <p class="text-sm text-gray-400 mt-1">Yönetim Paneli</p>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <!-- Ana Sayfa Linki -->
            <a th:href="@{/admin}"
               th:classappend="${activeMenu == 'dashboard' ? 'bg-blue-600 text-white font-semibold' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block py-2.5 px-4 rounded transition duration-200">
                🏠 Ana Sayfa
            </a>
            <!-- Kullanıcı İşlemleri Linki -->
            <a th:href="@{/admin/users}"
               th:classappend="${activeMenu == 'users' ? 'bg-blue-600 text-white font-semibold' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block py-2.5 px-4 rounded transition duration-200">
                👥 Kullanıcı İşlemleri
            </a>
            <!-- Diğer Linkler (Şimdilik pasif) -->
            <a th:href="@{/admin/devices}"
               th:classappend="${activeMenu == 'devices' ? 'bg-blue-600 text-white font-semibold' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block py-2.5 px-4 rounded transition duration-200">
                🚜 Cihaz Yönetimi
            </a>

            <!-- Ağ ve Sistem Sağlığı (Eski Tarla Yönetimi Yerine) -->
            <a th:href="@{/admin/network}"
               th:classappend="${activeMenu == 'network' ? 'bg-blue-600 text-white font-semibold' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block py-2.5 px-4 rounded transition duration-200">
                📡 Ağ ve Sistem Sağlığı
            </a>

            <!-- Destek Talepleri -->
            <a th:href="@{/admin/support}"
               th:classappend="${activeMenu == 'support' ? 'bg-blue-600 text-white font-semibold' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block py-2.5 px-4 rounded transition duration-200">
                🎫 Destek Talepleri
            </a>

        </nav>
    </div>
    <div class="p-4 border-t border-gray-700 space-y-3">
        <a th:href="@{/}" class="flex items-center justify-center py-2 px-4 rounded bg-gray-700 hover:bg-gray-600 text-white transition duration-200">
            🌐 Ana Siteye Git
        </a>
        <a th:href="@{/logout}" class="flex items-center justify-center py-2 px-4 rounded bg-red-600 hover:bg-red-500 text-white font-bold transition duration-200">
            🚪 Çıkış Yap
        </a>
    </div>
</aside>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-md shadow-sm px-8 py-4 flex justify-between items-center fixed w-full top-0 z-50 border-b border-gray-100 dark:border-gray-800 transition-colors duration-300">
    <div class="flex items-center space-x-3">
        <div class="bg-green-600 p-2 rounded-lg shadow-lg shadow-green-200 dark:shadow-none">
            <i class="fas fa-leaf text-white text-xl"></i>
        </div>
        <a th:href="@{/}" class="text-2xl font-black tracking-tighter text-gray-900 dark:text-white transition-colors">TerraSense</a>
    </div>

    <div class="hidden md:flex space-x-8 font-semibold text-sm uppercase tracking-widest text-gray-500 dark:text-gray-400">
        <a th:href="@{/}"
           th:classappend="${activePage == 'home' ? 'text-green-600 dark:text-green-400 border-b-2 border-green-600 dark:border-green-400 pb-1' : 'hover:text-green-600 dark:hover:text-green-400 transition'}"
           class="pb-1">Tarlalarım</a>

        <a th:href="@{/devices}"
           th:classappend="${activePage == 'devices' ? 'text-green-600 dark:text-green-400 border-b-2 border-green-600 dark:border-green-400 pb-1' : 'hover:text-green-600 dark:hover:text-green-400 transition'}"
           class="pb-1">Cihaz Yönetimi</a>

        <a th:href="@{/forum}"
           th:classappend="${activePage == 'forum' ? 'text-green-600 dark:text-green-400 border-b-2 border-green-600 dark:border-green-400 pb-1' : 'hover:text-green-600 dark:hover:text-green-400 transition'}"
           class="pb-1">Çiftçi Forum</a>

        <a th:href="@{/markets}"
           th:classappend="${activePage == 'markets' ? 'text-green-600 dark:text-green-400 border-b-2 border-green-600 dark:border-green-400 pb-1' : 'hover:text-green-600 dark:hover:text-green-400 transition'}"
           class="pb-1">Biyolojik Bilgiler</a>

        <a th:href="@{/notifications}"
           th:classappend="${activePage == 'notifications' ? 'text-green-600 dark:text-green-400 border-b-2 border-green-600 dark:border-green-400 pb-1' : 'hover:text-green-600 dark:hover:text-green-400 transition'}"
           class="pb-1">Bildirimler</a>

        <a th:if="${isAdmin}"
           th:href="@{/admin}"
           class="text-red-500 hover:text-red-700 dark:hover:text-red-400 transition">Panel</a>
    </div>

    <div class="flex items-center space-x-4 border-l pl-6 border-gray-100 dark:border-gray-700 relative group transition-colors">
        <div class="text-right hidden sm:block">
            <p class="text-sm font-bold text-gray-900 dark:text-white leading-none transition-colors" th:text="${userName}">Kullanıcı</p>
        </div>

        <div class="w-10 h-10 bg-gray-200 dark:bg-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 shadow-inner cursor-pointer hover:bg-green-100 dark:hover:bg-gray-600 transition relative">
            <i class="fas fa-user text-lg"></i>

            <div class="absolute right-0 top-full mt-2 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 translate-y-2 group-hover:translate-y-0 z-50">

                <a th:href="@{/profile}" class="flex items-center px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    <i class="fas fa-user-circle mr-3 text-gray-400 dark:text-gray-500"></i> Profil Bilgilerim
                </a>

                <a th:href="@{/settings}" class="flex items-center px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-green-50 dark:hover:bg-gray-700 hover:text-green-700 dark:hover:text-white transition font-medium">
                    <i class="fas fa-sliders-h mr-3 text-gray-400 dark:text-gray-500"></i> Ayarlar
                </a>

                <a th:href="@{/support}" class="flex items-center px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-700 dark:hover:text-white transition font-medium">
                    <i class="fas fa-headset mr-3 text-gray-400 dark:text-gray-500"></i> Destek Talebi
                </a>

                <hr class="my-1 border-gray-100 dark:border-gray-700">

                <form th:action="@{/logout}" method="post" class="block w-full">
                    <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-gray-700 transition font-semibold flex items-center">
                        <i class="fas fa-sign-out-alt mr-3"></i> Çıkış Yap
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, title)"
      th:class="${user != null and user.darkModeActive == true ? 'dark' : ''}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | TerraSense'">TerraSense</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'fade-in-down': 'fadeInDown 0.5s ease-out',
          },
          keyframes: {
            fadeInDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Smooth geçiş efekti */
    .transition-colors {
      transition-property: background-color, border-color, color, fill, stroke;
      transition-duration: 300ms;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300 min-h-screen">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="mt-28 max-w-7xl mx-auto p-4 md:p-6 lg:p-8">
  <div th:replace="${content}"></div>
</main>

<footer class="mt-auto py-12 text-center">
  <div class="h-[1px] w-1/4 mx-auto bg-gray-200 dark:bg-gray-800 mb-8"></div>
  <p class="text-gray-400 dark:text-gray-600 text-[10px] font-black uppercase tracking-[0.3em]">
    &copy; 2026 TerraSense | AI Smart Farming Simulation
  </p>
</footer>

<script>
  // Sayfa yüklendiğinde yapılacak işlemler
  document.addEventListener('DOMContentLoaded', () => {
    console.log("TerraSense Layout Yüklendi. Mod: " +
            (document.documentElement.classList.contains('dark') ? 'Karanlık' : 'Aydınlık'));
  });
</script>
</body>
</html>

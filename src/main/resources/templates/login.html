<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AgroNexus | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-gray-900 tracking-tight">AgroNexus</h1>
        <p class="text-gray-500 mt-2 font-medium">Hoş Geldiniz</p>
    </div>

    <div th:if="${param.success}" class="mb-6 p-4 bg-green-50 text-green-700 text-xs font-bold rounded-xl border border-green-100">
        Kayıt başarılı! Şimdi giriş yapabilirsiniz.
    </div>

    <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 text-red-700 text-xs font-bold rounded-xl border border-red-100">
        E-posta veya şifre hatalı.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">
        <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">E-posta</label>
            <input type="email" name="username" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none transition" required>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Şifre</label>
            <input type="password" name="password" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none transition" required>
        </div>
        <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg shadow-gray-200 transition-all active:scale-95">
            Giriş Yap
        </button>
    </form>
    <p class="text-center mt-6 text-sm text-gray-500">
        Hesabın yok mu? <a href="register.html" class="text-green-600 font-bold hover:underline">Yeni Kayıt Oluştur</a>
    </p>
</div>
</body>
</html>

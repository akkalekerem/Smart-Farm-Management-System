<div th:replace="~{layout :: layout(~{::section}, 'Çiftçi Forumu')}">
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <section>
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight text-left">Çiftçi Forumu</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1 text-left">Diğer üreticilerle bilgi alışverişinde bulunun ve sorularınızı sorun.</p>
      </div>
      <button onclick="document.getElementById('addPostModal').classList.remove('hidden')" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold flex items-center transition-all active:scale-95 shadow-lg shadow-green-100 dark:shadow-none">
        <i class="fas fa-pen-nib mr-2"></i> Yeni Konu Aç
      </button>
    </div>

    <div th:if="${posts == null or posts.isEmpty()}" class="bg-white dark:bg-gray-800 p-12 rounded-[2.5rem] border border-dashed border-gray-300 dark:border-gray-700 text-center shadow-sm transition-colors">
      <div class="w-16 h-16 bg-gray-50 dark:bg-gray-700 text-gray-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-comments text-2xl"></i>
      </div>
      <h3 class="text-lg font-bold text-gray-900 dark:text-white">Henüz Konu Açılmamış</h3>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">İlk soruyu soran sen ol!</p>
    </div>

    <div class="space-y-4">
      <a th:each="post : ${posts}" th:href="@{'/forum/' + ${post.id}}" class="block bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 hover:border-green-200 dark:hover:border-green-900/50 hover:shadow-md transition-all cursor-pointer group text-left">
        <div class="flex justify-between items-start">
          <div>
            <span class="text-[10px] font-black bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-2 py-1 rounded-md uppercase" th:text="${post.category}">Kategori</span>
            <h3 class="font-bold text-lg text-gray-900 dark:text-white mt-2 group-hover:text-green-600 dark:group-hover:text-green-400 transition-colors" th:text="${post.title}">Konu Başlığı</h3>
            <p class="text-sm text-gray-400 dark:text-gray-500 mt-1 font-medium">
              <span th:text="${post.author.firstName + ' ' + post.author.lastName}">Yazar</span> •
              <span th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}">Tarih</span> •
              <span th:text="${post.comments.size()} + ' Yanıt'">0 Yanıt</span>
            </p>
          </div>
          <i class="fas fa-chevron-right text-gray-300 dark:text-gray-600 group-hover:text-green-500 transition-colors mt-2"></i>
        </div>
      </a>
    </div>

    <div id="addPostModal" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[150] flex items-center justify-center">
      <div class="bg-white dark:bg-gray-800 p-8 rounded-[2rem] w-full max-w-lg shadow-2xl border border-gray-100 dark:border-gray-700 transform transition-all">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-black text-gray-900 dark:text-white">Yeni Konu Oluştur</h3>
          <button type="button" onclick="document.getElementById('addPostModal').classList.add('hidden')" class="text-gray-400 hover:text-red-500 transition-colors">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <form th:action="@{/forum/add}" method="post" class="space-y-5 text-left">
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-2">Başlık</label>
            <input type="text" name="title" placeholder="Sorunuzu veya konuyu kısaca özetleyin" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 font-bold outline-none focus:ring-2 focus:ring-green-500 transition" required>
          </div>
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-2">Kategori</label>
            <select name="category" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 font-bold outline-none focus:ring-2 focus:ring-green-500 cursor-pointer transition" required>
              <option value="Sulama">Sulama Teknolojileri</option>
              <option value="Gübreleme">Gübreleme ve İlaçlama</option>
              <option value="Donanım">Sensör ve Donanım Sorunları</option>
              <option value="Genel">Genel Tartışma</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 mb-2">İçerik</label>
            <textarea name="content" rows="4" placeholder="Detayları buraya yazın..." class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 font-medium outline-none focus:ring-2 focus:ring-green-500 resize-none transition" required></textarea>
          </div>
          <div class="pt-4 flex space-x-3 border-t border-gray-100 dark:border-gray-700 mt-4">
            <button type="button" onclick="document.getElementById('addPostModal').classList.add('hidden')" class="w-1/3 bg-gray-100 dark:bg-gray-700 font-bold py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition">İptal</button>
            <button type="submit" class="w-2/3 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-green-100 dark:shadow-none active:scale-95 transition">Yayınla</button>
          </div>
        </form>
      </div>
    </div>

  </section>
</div>

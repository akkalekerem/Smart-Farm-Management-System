<div th:replace="~{layout :: layout(~{::section}, 'Çiftçi Forumu')}">
  <section>
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Çiftçi Forumu</h1>
        <p class="text-gray-500 mt-1">Diğer üreticilerle bilgi alışverişinde bulunun ve sorularınızı sorun.</p>
      </div>
      <button onclick="document.getElementById('addPostModal').classList.remove('hidden')" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold flex items-center transition-all active:scale-95 shadow-lg shadow-green-100">
        <i class="fas fa-pen-nib mr-2"></i> Yeni Konu Aç
      </button>
    </div>

    <div th:if="${posts == null or posts.isEmpty()}" class="bg-white p-12 rounded-[2.5rem] border border-dashed border-gray-300 text-center shadow-sm">
      <div class="w-16 h-16 bg-gray-50 text-gray-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-comments text-2xl"></i>
      </div>
      <h3 class="text-lg font-bold text-gray-900">Henüz Konu Açılmamış</h3>
      <p class="text-gray-500 text-sm mt-1">İlk soruyu soran sen ol!</p>
    </div>

    <div class="space-y-4">
      <a th:each="post : ${posts}" th:href="@{'/forum/' + ${post.id}}" class="block bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:border-green-200 hover:shadow-md transition-all cursor-pointer group">
        <div class="flex justify-between items-start">
          <div>
            <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-md uppercase" th:text="${post.category}">Kategori</span>
            <h3 class="font-bold text-lg text-gray-900 mt-2 group-hover:text-green-600 transition-colors" th:text="${post.title}">Konu Başlığı</h3>
            <p class="text-sm text-gray-400 mt-1">
              <span th:text="${post.author.firstName + ' ' + post.author.lastName}">Yazar</span> •
              <span th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}">Tarih</span> •
              <span th:text="${post.comments.size()} + ' Yanıt'">0 Yanıt</span>
            </p>
          </div>
          <i class="fas fa-chevron-right text-gray-300 group-hover:text-green-500 transition-colors mt-2"></i>
        </div>
      </a>
    </div>

    <div id="addPostModal" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[150] flex items-center justify-center">
      <div class="bg-white p-8 rounded-[2rem] w-full max-w-lg shadow-2xl border border-gray-100 transform transition-all">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-black text-gray-900">Yeni Konu Oluştur</h3>
          <button type="button" onclick="document.getElementById('addPostModal').classList.add('hidden')" class="text-gray-400 hover:text-red-500">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <form th:action="@{/forum/add}" method="post" class="space-y-5 text-left">
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Başlık</label>
            <input type="text" name="title" placeholder="Sorunuzu veya konuyu kısaca özetleyin" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 font-bold text-gray-700 outline-none focus:border-green-500" required>
          </div>
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Kategori</label>
            <select name="category" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 font-bold text-gray-700 outline-none focus:border-green-500 cursor-pointer" required>
              <option value="Sulama">Sulama Teknolojileri</option>
              <option value="Gübreleme">Gübreleme ve İlaçlama</option>
              <option value="Donanım">Sensör ve Donanım Sorunları</option>
              <option value="Genel">Genel Tartışma</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">İçerik</label>
            <textarea name="content" rows="4" placeholder="Detayları buraya yazın..." class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 font-medium text-gray-700 outline-none focus:border-green-500 resize-none" required></textarea>
          </div>
          <div class="pt-4 flex space-x-3">
            <button type="button" onclick="document.getElementById('addPostModal').classList.add('hidden')" class="w-1/3 bg-gray-100 font-bold py-3 rounded-xl text-gray-600 hover:bg-gray-200">İptal</button>
            <button type="submit" class="w-2/3 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-green-100 active:scale-95">Yayınla</button>
          </div>
        </form>
      </div>
    </div>

  </section>
</div>

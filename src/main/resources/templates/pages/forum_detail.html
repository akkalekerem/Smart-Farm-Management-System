<div th:replace="~{layout :: layout(~{::section}, ${post.title})}">
    <section>
        <div class="mb-6">
            <a th:href="@{/forum}" class="text-gray-400 hover:text-green-600 font-bold text-sm inline-flex items-center transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Foruma Dön
            </a>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 mb-8">
            <div class="flex items-center space-x-3 mb-4">
                <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-md uppercase" th:text="${post.category}">Kategori</span>
                <span class="text-sm text-gray-400 font-medium" th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}">Tarih</span>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-6" th:text="${post.title}">Konu Başlığı</h1>
            <div class="text-gray-700 leading-relaxed font-medium mb-8 whitespace-pre-wrap" th:text="${post.content}">
                Konu içeriği buraya gelecek...
            </div>
            <div class="flex items-center space-x-3 border-t border-gray-100 pt-6">
                <div class="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center text-green-600 font-bold">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <p class="text-sm font-bold text-gray-900" th:text="${post.author.firstName + ' ' + post.author.lastName}">Yazar Adı</p>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-black">Konu Sahibi</p>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-extrabold text-gray-900 mb-6 flex items-center">
            <i class="fas fa-comments text-green-500 mr-2"></i>
            Yanıtlar <span class="ml-2 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-md text-sm" th:text="${post.comments.size()}">0</span>
        </h3>

        <div class="space-y-4 mb-10">
            <div th:if="${post.comments.isEmpty()}" class="p-6 bg-gray-50 rounded-2xl border border-gray-100 text-center text-gray-500 font-medium text-sm">
                Henüz yanıt verilmemiş. İlk yanıtı sen yaz!
            </div>

            <div th:each="comment : ${post.comments}" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex space-x-4">
                <div class="w-10 h-10 bg-gray-100 rounded-full flex-shrink-0 flex items-center justify-center text-gray-500">
                    <i class="fas fa-user text-sm"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-sm font-bold text-gray-900" th:text="${comment.author.firstName + ' ' + comment.author.lastName}">Yanıtlayan</p>
                        <p class="text-xs text-gray-400 font-medium" th:text="${#temporals.format(comment.createdAt, 'dd MMM HH:mm')}">Zaman</p>
                    </div>
                    <p class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap" th:text="${comment.content}">Yorum içeriği...</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <h4 class="text-sm font-bold text-gray-900 mb-4 uppercase tracking-wide">Yanıt Yaz</h4>
            <form th:action="@{'/forum/' + ${post.id} + '/comment'}" method="post">
                <textarea name="content" rows="3" placeholder="Fikrini veya çözümünü paylaş..." class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 font-medium text-gray-700 outline-none focus:border-green-500 resize-none mb-4" required></textarea>
                <div class="flex justify-end">
                    <button type="submit" class="bg-gray-900 hover:bg-black text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md active:scale-95 flex items-center">
                        <i class="fas fa-paper-plane mr-2"></i> Gönder
                    </button>
                </div>
            </form>
        </div>
    </section>
</div>

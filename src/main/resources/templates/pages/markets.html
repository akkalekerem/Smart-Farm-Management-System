<div th:replace="~{layout :: layout(~{::section}, 'Ürün Rehberi')}">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-10 text-center lg:text-left">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Ürün Yetiştirme Rehberi</h1>
            <p class="text-gray-500 mt-2">Bitkilerinizin sağlıklı gelişimi için gereken ideal sınırlar.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="crop : ${crops}" class="group bg-white rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-2xl transition-all duration-500 overflow-hidden transform hover:-translate-y-2">

                <div class="bg-gradient-to-r from-green-600 to-green-500 p-6 flex justify-between items-center text-white">
                    <div>
                        <h3 class="text-2xl font-bold" th:text="${crop.name}">Ürün Adı</h3>
                        <span class="text-xs opacity-80 font-medium tracking-widest uppercase">Biyolojik Parametreler</span>
                    </div>
                    <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
                        <i class="fas fa-microscope text-2xl"></i>
                    </div>
                </div>

                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-orange-50/50 p-4 rounded-2xl border border-orange-100/50">
                            <p class="text-[10px] text-orange-600 font-bold uppercase tracking-widest mb-1">Sıcaklık</p>
                            <p class="text-gray-900 font-black text-lg" th:text="${crop.minTemp} + '° - ' + ${crop.maxTemp} + '°'"></p>
                        </div>
                        <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                            <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mb-1">Nem</p>
                            <p class="text-gray-900 font-black text-lg" th:text="'%' + ${crop.minMoisture} + ' - %' + ${crop.maxMoisture}"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-yellow-50/50 p-4 rounded-2xl border border-yellow-100/50">
                            <p class="text-[10px] text-yellow-600 font-bold uppercase tracking-widest mb-1">Işık (Lux)</p>
                            <p class="text-gray-900 font-black text-base" th:text="${crop.minLight} + ' - ' + ${crop.maxLight}"></p>
                        </div>
                        <div class="bg-purple-50/50 p-4 rounded-2xl border border-purple-100/50">
                            <p class="text-[10px] text-purple-600 font-bold uppercase tracking-widest mb-1">Besin (EC)</p>
                            <p class="text-gray-900 font-black text-lg" th:text="${crop.minEc} + ' - ' + ${crop.maxEc}"></p>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-50">
                        <div class="flex items-center space-x-2 mb-2">
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Teknik Tavsiye</p>
                        </div>
                        <p class="text-sm text-gray-600 leading-relaxed italic" th:text="${crop.aiSpecialNote}"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

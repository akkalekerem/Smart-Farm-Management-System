<div th:replace="~{layout :: layout(~{::section}, 'Güncel Piyasalar')}">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Güncel Piyasalar</h1>
            <p class="text-gray-500 mt-1">TerraSense aracılığıyla yerel hallerden alınan anlık fiyat verileri.</p>
        </div>

        <div th:if="${prices == null || prices.isEmpty()}"
             class="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-xl mb-8">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle text-orange-400 text-xl mr-3"></i>
                <div>
                    <p class="text-orange-800 font-bold">Veri Bağlantısı Kesildi</p>
                    <p class="text-orange-700 text-sm">Şu an güncel fiyatlara ulaşılamıyor. API limiti dolmuş veya anahtarınız hatalı olabilir.</p>
                </div>
            </div>
        </div>

        <div th:if="${prices != null && !prices.isEmpty()}"
             class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

            <div th:each="price : ${prices}"
                 class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 group">

                <div class="flex justify-between items-start">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center text-green-600 group-hover:bg-green-600 group-hover:text-white transition-colors">
                            <i class="fas fa-seedling text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-lg" th:text="${price.name}">Ürün Adı</h3>
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800"
                                  th:text="${price.type}">Birim</span>
                        </div>
                    </div>

                    <div class="text-right">
                        <span class="block text-2xl font-black text-green-700" th:text="${price.price} + ' ₺'">0.00 ₺</span>
                        <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Güncel Fiyat</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

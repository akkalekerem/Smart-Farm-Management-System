<div th:replace="~{layout :: layout(~{::section}, 'Bildirimler')}" xmlns:th="http://www.w3.org/1999/xhtml">
    <section>
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Bildirimler</h1>
                <p class="text-gray-500 mt-1">Tarlalarınızdan gelen son uyarılar ve analizler.</p>
            </div>
            <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl border border-blue-100 font-bold text-sm shadow-sm">
                <i class="fas fa-bell mr-2"></i> <span th:text="${notifications.size()}">0</span> Bildirim
            </div>
        </div>

        <div class="space-y-4">
            <div th:if="${notifications.isEmpty()}" class="bg-white p-12 rounded-[2rem] border border-dashed border-gray-200 text-center">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-bell-slash text-gray-300 text-3xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900">Henüz bildirim yok</h3>
                <p class="text-gray-500">Tarlalarınızdaki sensör verileri normal seyrediyor.</p>
            </div>

            <div th:each="note : ${notifications}"
                 th:classappend="${!note.isRead} ? 'border-l-4 border-l-green-500 bg-green-50/30' : 'bg-white'"
                 class="p-6 rounded-2xl border border-gray-100 shadow-sm transition-all hover:shadow-md">

                <div class="flex items-start justify-between">
                    <div class="flex items-start space-x-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm"
                             th:classappend="${note.message.contains('⚠️') || note.message.contains('🔥')} ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'">
                            <i th:class="${note.message.contains('🔥')} ? 'fas fa-fire' : 'fas fa-info-circle'" class="text-xl"></i>
                        </div>

                        <div>
                            <p class="text-gray-900 font-bold leading-snug" th:text="${note.message}">Bildirim Mesajı</p>
                            <div class="flex items-center mt-2 space-x-3">
                                <span class="text-[11px] font-black uppercase tracking-widest text-gray-400">
                                    <i class="far fa-clock mr-1"></i>
                                    <span th:text="${#temporals.format(note.timestamp, 'dd MMMM yyyy HH:mm')}">Tarih</span>
                                </span>
                                <span th:if="${!note.isRead}" class="bg-green-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">Yeni</span>
                            </div>
                        </div>
                    </div>

                    <button class="text-gray-300 hover:text-red-500 transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>
</div>

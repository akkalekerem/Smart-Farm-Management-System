<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayarlar | TerraSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#fcfdfd]">

<header class="fixed top-0 w-full bg-white/80 backdrop-blur-lg z-50 border-b border-gray-100">
    <div class="max-w-4xl mx-auto px-6 h-20 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <a th:href="@{/}" class="flex items-center space-x-2 text-gray-500 hover:text-green-600 transition-all group">
                <i class="fas fa-arrow-left text-sm group-hover:-translate-x-1 transition-transform"></i>
                <span class="font-bold text-sm tracking-tight">Panel'e Dön</span>
            </a>
            <div class="h-6 w-[1px] bg-gray-200"></div>
            <span class="text-xl font-extrabold tracking-tighter text-gray-900">TerraSense <span class="text-green-600">Ayarlar</span></span>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-6 pt-32 pb-20">

    <div class="mb-10">
        <h2 class="text-3xl font-black text-gray-900 tracking-tight">Sistem Tercihleri</h2>
        <p class="text-gray-500 mt-2 font-medium">Uygulama kullanımını ve bildirimleri kendine göre uyarla.</p>
    </div>

    <div class="space-y-8">

        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] border border-gray-100 shadow-sm">
            <div class="flex items-center space-x-3 mb-8">
                <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-bell"></i>
                </div>
                <h3 class="text-xl font-extrabold text-gray-900">Bildirim Kanalları</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex justify-between items-center p-5 bg-gray-50 rounded-2xl border border-transparent hover:border-green-100 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="text-blue-500">
                            <i class="fas fa-comment-dots text-xl"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900 text-sm">SMS Bildirimi</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">Kritik Uyarılar</p>
                        </div>
                    </div>
                    <input type="checkbox" class="w-11 h-6 bg-gray-300 rounded-full appearance-none checked:bg-green-500 transition-all cursor-pointer relative after:content-[''] after:absolute after:w-5 after:h-5 after:bg-white after:rounded-full after:top-0.5 after:left-0.5 checked:after:left-5.5 after:transition-all shadow-sm">
                </div>

                <div class="flex justify-between items-center p-5 bg-gray-50 rounded-2xl border border-transparent hover:border-green-100 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="text-orange-500">
                            <i class="fas fa-envelope-open-text text-xl"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900 text-sm">E-Posta Raporu</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">Haftalık Özet</p>
                        </div>
                    </div>
                    <input type="checkbox" checked class="w-11 h-6 bg-gray-300 rounded-full appearance-none checked:bg-green-500 transition-all cursor-pointer relative after:content-[''] after:absolute after:w-5 after:h-5 after:bg-white after:rounded-full after:top-0.5 after:left-0.5 checked:after:left-5.5 after:transition-all shadow-sm">
                </div>
            </div>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] border border-gray-100 shadow-sm">
            <div class="flex items-center space-x-3 mb-8">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-ruler-combined"></i>
                </div>
                <h3 class="text-xl font-extrabold text-gray-900">Birim Ayarları</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="group">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2 block">Arazi Ölçü Birimi</label>
                    <select class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 font-bold text-gray-700 outline-none focus:ring-2 focus:ring-green-500/20 transition-all appearance-none cursor-pointer">
                        <option>Dönüm</option>
                        <option>Hektar</option>
                        <option>Metrekare</option>
                    </select>
                </div>
                <div class="group">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2 block">Sıcaklık Birimi</label>
                    <select class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 font-bold text-gray-700 outline-none focus:ring-2 focus:ring-green-500/20 transition-all appearance-none cursor-pointer">
                        <option>Santigrat (°C)</option>
                        <option>Fahrenhayt (°F)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex justify-center md:justify-end pt-4">
            <button class="w-full md:w-auto bg-green-600 text-white px-12 py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-green-200 hover:bg-green-700 hover:-translate-y-1 transition-all active:scale-95">
                Değişiklikleri Uygula
            </button>
        </div>

    </div>

    <p class="text-center text-gray-400 text-xs mt-16 font-medium tracking-wide">
        Tercihleriniz TerraSense bulut sunucularında güvenle saklanır.
    </p>
</main>

</body>
</html>

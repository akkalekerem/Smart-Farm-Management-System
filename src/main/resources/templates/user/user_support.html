<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:class="${user.darkModeActive ? 'dark' : ''}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destek | TerraSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-[#fcfdfd] dark:bg-gray-900 transition-colors duration-300">

<header class="fixed top-0 w-full bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg z-50 border-b border-gray-100 dark:border-gray-700">
  <div class="max-w-5xl mx-auto px-6 h-20 flex justify-between items-center">
    <div class="flex items-center space-x-8">
      <a th:href="@{/}" class="flex items-center space-x-2 text-gray-500 dark:text-gray-400 hover:text-green-600 transition-all group">
        <i class="fas fa-arrow-left text-sm group-hover:-translate-x-1 transition-transform"></i>
        <span class="font-bold text-sm tracking-tight">Panel'e Dön</span>
      </a>
      <div class="flex items-center space-x-2">
        <div class="bg-green-600 p-1.5 rounded-lg">
          <i class="fas fa-leaf text-white text-xs"></i>
        </div>
        <span class="text-xl font-extrabold tracking-tighter text-gray-900 dark:text-white">TerraSense</span>
      </div>
    </div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 pt-32 pb-20">
  <div class="bg-white dark:bg-gray-800 p-10 rounded-[2.5rem] border border-gray-100 dark:border-gray-700 shadow-sm">
    <div class="mb-10 text-center">
      <h3 class="text-3xl font-extrabold text-gray-900 dark:text-white">Destek Merkezi</h3>
      <p class="text-sm text-gray-400 dark:text-gray-500 mt-2">Sorularınız için bize mesaj bırakın, uzman ekibimiz en kısa sürede dönecektir.</p>
    </div>

    <form th:action="@{/support/send}" method="POST" class="space-y-6">
      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Konu Başlığı</label>
        <input type="text" name="subject" required class="w-full p-4 bg-gray-50 dark:bg-gray-700/50 dark:text-white border border-gray-100 dark:border-gray-600 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="Sorununuzu kısaca özetleyin...">
      </div>

      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Mesajınız</label>
        <textarea name="message" rows="5" required class="w-full p-4 bg-gray-50 dark:bg-gray-700/50 dark:text-white border border-gray-100 dark:border-gray-600 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="Detaylı bilgi verin..."></textarea>
      </div>

      <button type="submit" class="w-full bg-gray-900 dark:bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-600 transition shadow-lg">
        Talebi Gönder
      </button>
    </form>
  </div>
</main>

</body>
</html>
